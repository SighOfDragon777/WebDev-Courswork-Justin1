<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button | Hello World Function</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f0f7f4 0%, #e2ece7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a5d4e;
            margin-bottom: 1rem;
            letter-spacing: -0.3px;
        }

        .message-box {
            background: #f4f9f6;
            border-radius: 1.5rem;
            padding: 1.8rem;
            margin: 1.8rem 0;
            border-left: 5px solid #2c9c82;
            text-align: center;
        }

        #greetingText {
            font-size: 2rem;
            font-weight: 700;
            color: #1f6e5c;
            transition: all 0.2s ease;
            word-break: break-word;
        }

        .initial-message {
            font-size: 1rem;
            color: #6e8b7f;
            margin-bottom: 0.5rem;
        }

        button {
            background: #1f6e5c;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(31, 110, 92, 0.3);
            margin-top: 0.5rem;
        }

        button:hover {
            background: #0c5c49;
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(31, 110, 92, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .hint-note {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #8ba89b;
            border-top: 1px solid #ddebe5;
            padding-top: 1.2rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            #greetingText {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ Interactive JavaScript</h1>
    <div class="message-box">
        <div class="initial-message">Current message:</div>
        <div id="greetingText">Hello World!</div>
    </div>
    
    <button id="changeMessageBtn" onclick="updateGreeting()">Click me to change message → 🌟</button>
    
    <div class="hint-note">
        ⚡ The page loads with "Hello World!" — click the button to see the magic happen.
    </div>
</div>

<script>
    function updateGreeting() {
        const greetingElement = document.getElementById('greetingText');
        greetingElement.textContent = '🎉 You clicked the button! Greetings from JavaScript! 🚀';
        greetingElement.style.color = '#b46b3a';
        greetingElement.style.fontSize = '1.6rem';
        
        const messageBox = document.querySelector('.message-box');
        messageBox.style.backgroundColor = '#fff6ed';
        messageBox.style.borderLeftColor = '#b46b3a';
        
        const button = document.getElementById('changeMessageBtn');
        button.textContent = '✨ Message changed! ✨';
        button.style.opacity = '0.9';
        
        setTimeout(() => {
            button.textContent = 'Click again for another surprise → 🌟';
            button.style.opacity = '1';
        }, 2000);
    }
    
    console.log('Page loaded. Initial text: "Hello World!" ready. Click button to trigger function.');
</script>

</body>
</html>
